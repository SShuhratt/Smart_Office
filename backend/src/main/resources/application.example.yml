spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_assets
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: REPLACE_WITH_STRONG_256_BIT_SECRET
    expiration-ms: 86400000
